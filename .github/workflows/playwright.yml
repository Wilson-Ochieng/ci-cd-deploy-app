name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # PostgreSQL service container
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: loadlink_user
          POSTGRES_PASSWORD: yourpassword
          POSTGRES_DB: loadlink
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    # Install frontend dependencies
    - name: Install dependencies
      run: npm ci

    # Install backend dependencies
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci
        npm install --save-dev wait-on

    # Wait for PostgreSQL to be ready
    - name: Wait for PostgreSQL
      run: until pg_isready -h localhost -p 5432; do sleep 1; done

    # Create database schema (embedded SQL)
    - name: Setup database schema
      run: |
        PGPASSWORD=yourpassword psql -h localhost -U loadlink_user -d loadlink << 'EOF'

        -- Users table
        CREATE TABLE IF NOT EXISTS users (
            id SERIAL PRIMARY KEY,
            phone_number VARCHAR(15) UNIQUE NOT NULL,
            full_name VARCHAR(100) NOT NULL,
            role VARCHAR(20) NOT NULL CHECK (role IN ('shipper', 'transporter', 'admin')),
            password_hash VARCHAR(255) NOT NULL,
            vehicle_type VARCHAR(50),
            vehicle_registration VARCHAR(20),
            id_number VARCHAR(20),
            verified BOOLEAN DEFAULT FALSE,
            rating DECIMAL(2,1) DEFAULT 0.0,
            total_trips INTEGER DEFAULT 0,
            created_at TIMESTAMP DEFAULT NOW(),
            updated_at TIMESTAMP DEFAULT NOW()
        );

        -- Loads table
        CREATE TABLE IF NOT EXISTS loads (
            id SERIAL PRIMARY KEY,
            shipper_id INTEGER REFERENCES users(id) ON DELETE CASCADE,
            pickup_location TEXT NOT NULL,
            pickup_lat DECIMAL(10,8),
            pickup_lng DECIMAL(11,8),
            dropoff_location TEXT NOT NULL,
            dropoff_lat DECIMAL(10,8),
            dropoff_lng DECIMAL(11,8),
            description TEXT,
            weight_kg INTEGER NOT NULL,
            distance_km DECIMAL(8,2),
            offered_price DECIMAL(10,2),
            status VARCHAR(20) DEFAULT 'pending' CHECK (status IN ('pending', 'accepted', 'in_progress', 'delivered', 'cancelled')),
            expires_at TIMESTAMP DEFAULT NOW() + INTERVAL '24 hours',
            created_at TIMESTAMP DEFAULT NOW(),
            updated_at TIMESTAMP DEFAULT NOW()
        );

        -- Trips table
        CREATE TABLE IF NOT EXISTS trips (
            id SERIAL PRIMARY KEY,
            load_id INTEGER REFERENCES loads(id) ON DELETE CASCADE,
            transporter_id INTEGER REFERENCES users(id),
            shipper_id INTEGER REFERENCES users(id),
            agreed_price DECIMAL(10,2) NOT NULL,
            status VARCHAR(20) DEFAULT 'accepted' CHECK (status IN ('accepted', 'picked_up', 'in_transit', 'delivered', 'completed', 'cancelled')),
            pickup_time TIMESTAMP,
            delivery_time TIMESTAMP,
            proof_photo_url TEXT,
            tracking_link VARCHAR(255),
            created_at TIMESTAMP DEFAULT NOW(),
            updated_at TIMESTAMP DEFAULT NOW()
        );

        -- Payments table
        CREATE TABLE IF NOT EXISTS payments (
            id SERIAL PRIMARY KEY,
            trip_id INTEGER REFERENCES trips(id) ON DELETE CASCADE,
            amount DECIMAL(10,2) NOT NULL,
            type VARCHAR(20) NOT NULL CHECK (type IN ('shipper_payment', 'transporter_payout', 'platform_commission')),
            mpesa_receipt_number VARCHAR(50),
            status VARCHAR(20) DEFAULT 'pending' CHECK (status IN ('pending', 'completed', 'failed')),
            created_at TIMESTAMP DEFAULT NOW()
        );

        -- Ratings table
        CREATE TABLE IF NOT EXISTS ratings (
            id SERIAL PRIMARY KEY,
            trip_id INTEGER REFERENCES trips(id) ON DELETE CASCADE,
            from_user_id INTEGER REFERENCES users(id),
            to_user_id INTEGER REFERENCES users(id),
            rating INTEGER CHECK (rating BETWEEN 1 AND 5),
            comment TEXT,
            created_at TIMESTAMP DEFAULT NOW(),
            UNIQUE(trip_id, from_user_id)
        );

        -- Indexes
        CREATE INDEX IF NOT EXISTS idx_users_role ON users(role);
        CREATE INDEX IF NOT EXISTS idx_loads_status ON loads(status);
        CREATE INDEX IF NOT EXISTS idx_loads_shipper ON loads(shipper_id);
        CREATE INDEX IF NOT EXISTS idx_trips_transporter ON trips(transporter_id);
        CREATE INDEX IF NOT EXISTS idx_trips_load ON trips(load_id);
        CREATE INDEX IF NOT EXISTS idx_trips_status ON trips(status);
        CREATE INDEX IF NOT EXISTS idx_payments_trip ON payments(trip_id);

        EOF

    # Start backend server in background
    - name: Start backend
      run: |
        cd backend
        node server.js &
        npx wait-on http://localhost:5000
      env:
        DB_HOST: localhost
        DB_USER: loadlink_user
        DB_PASSWORD: yourpassword
        DB_NAME: loadlink
        JWT_SECRET: test_secret
        ADMIN_SECRET: supersecretkey123

    # Install Playwright browsers
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # Run Playwright tests (backend must be live)
    - name: Run Playwright tests
      run: npx playwright test
      env:
        BASE_URL: http://localhost:3000   # optional, used only if tests need frontend

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
    - uses: actions/checkout@v4
    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
        working-directory: ./